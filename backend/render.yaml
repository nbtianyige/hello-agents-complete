services:
  # Backend API Service
  - type: web
    name: hello-agents-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Python settings
      - key: PYTHON_VERSION
        value: 3.11.0
      
      # LLM Settings (从环境配置中获取)
      - key: LLM_MODEL_ID
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false
      
      # Map Settings
      - key: AMAP_API_KEY
        sync: false
      
      # Server Settings
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
      
      # CORS
      - key: CORS_ORIGINS
        sync: false
